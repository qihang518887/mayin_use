name: Build gscore with nodejs

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry Docker
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
          
      - name: 检查gscore镜像
        id: check
        run: |
          DIGEST_GSCORE_NEW=$(curl --request GET   --url 'https://api.cnb.cool/gscore-mirror/gsuid_core/-/packages/docker/gsuid_core/-/tag/latest?arch=arm64'   --header 'Accept: application/vnd.cnb.api+json'   --header 'Authorization: Bearer ${{ secrets.CNB_TOKEN }}' | jq -r '.docker.image.digest')
          DIGEST_GSCORE_OLD=$(cat gscore_nodejs/digest.txt)

          echo "digest_new=$DIGEST_GSCORE_NEW" >> "$GITHUB_OUTPUT"
          echo "digest_old=$DIGEST_GSCORE_OLD" >> "$GITHUB_OUTPUT"
          echo "$DIGEST_GSCORE_NEW" > gscore_nodejs/digest.txt
          
      - name: 设置QEMU
        uses: docker/setup-qemu-action@v4
        
      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 更新镜像
        if: ${{ steps.check.outputs.digest_new != steps.check.outputs.digest_old }}
        uses: docker/build-push-action@v7
        with:
          context: ./gscore_nodejs
          push: true
          tags: mayin/gscore_nodejs
          platforms: linux/amd64,linux/arm64

      - name: 更新digest
        if: ${{ steps.check.outputs.digest_new != steps.check.outputs.digest_old }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "update_gscore_digest"
          git push
