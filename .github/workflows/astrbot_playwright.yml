name: Build AstrBot with Playwright

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  check:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 下载工件
        uses: actions/download-artifact@v8
        #with:
        #  name: digest
        continue-on-error: true

      - name: 登录到docker
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: 检查astrbot镜像
        id: check
        run: |
          DIGEST_ASTRBOT_NEW=$(curl -s "https://hub.docker.com/v2/namespaces/soulter/repositories/astrbot/tags/latest" | jq -r '.images[] | select(.architecture == "arm64") | .digest')
          DIGEST_ASTRBOT_OLD=$(cat astrbot.txt 2>/dev/null || echo "")

          echo "digest_new=$DIGEST_ASTRBOT_NEW" >> "$GITHUB_OUTPUT"
          echo "digest_old=$DIGEST_ASTRBOT_OLD" >> "$GITHUB_OUTPUT"
          echo "$DIGEST_ASTRBOT_NEW" > astrbot.txt

      - name: 更新工件
        uses: actions/upload-artifact@v7
        with:
          name: digest
          path: astrbot.txt

      - name: 若不一致则更新
        if: ${{ steps.check.outputs.digest_new != steps.check.outputs.digest_old }}
        uses: docker/build-push-action@v7
        with:
          context: ./astrbot_playwright
          push: true
          tags: mayin/astrbot_playwright
