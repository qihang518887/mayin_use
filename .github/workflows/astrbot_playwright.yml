name: Build AstrBot with Playwright

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6 

      - name: 登录到docker
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: 检查astrbot镜像
        id: check
        run: |
          DIGEST_ASTRBOT_NEW=$(curl -s "https://hub.docker.com/v2/namespaces/soulter/repositories/astrbot/tags/latest" | jq -r '.images[] | select(.architecture == "arm64") | .digest')
          DIGEST_ASTRBOT_OLD=$(cat astrbot_playwright/digest.txt)

          echo "digest_new=$DIGEST_ASTRBOT_NEW" >> "$GITHUB_OUTPUT"
          echo "digest_old=$DIGEST_ASTRBOT_OLD" >> "$GITHUB_OUTPUT"
          echo "$DIGEST_ASTRBOT_NEW" > astrbot_playwright/digest.txt

      - name: 设置QEMU
        uses: docker/setup-qemu-action@v4
        
      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 更新digest
        if: ${{ steps.check.outputs.digest_new != steps.check.outputs.digest_old }}
        uses: docker/build-push-action@v7
        with:
          context: ./astrbot_playwright
          push: true
          tags: mayin/astrbot_playwright
          platforms: linux/amd64,linux/arm64

      - name: 若不一致则更新
        if: ${{ steps.check.outputs.digest_new != steps.check.outputs.digest_old }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "update_asrbot_digest"
          git push
